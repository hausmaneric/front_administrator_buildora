<aside class="sidebar-shell">
  <div class="brand-block">
    <div class="brand-mark">
      <span class="bar bar-sm"></span>
      <span class="bar bar-md"></span>
      <span class="bar bar-lg"></span>
    </div>
    <div class="brand-copy">
      <h1>OBRAX</h1>
      <span>GESTAO DE OBRAS</span>
    </div>
  </div>

  <div class="menu-tree">
    <button type="button" class="menu-link root-link" [class.active]="isActive(dashboardItem.route)" (click)="navigate(dashboardItem.route)">
      <span class="menu-icon icon-{{ dashboardItem.iconKey }}"></span>
      <span class="menu-text">{{ dashboardItem.name }}</span>
    </button>

    @for (section of sections; track section.id) {
      <section class="menu-section">
        <div class="menu-section-title">{{ section.name }}</div>
        <div class="menu-section-items">
          @for (item of section.items; track item.id) {
            <button type="button" class="menu-link" [class.active]="isActive(item.route)" (click)="navigate(item.route)">
              <span class="menu-icon icon-{{ item.iconKey }}"></span>
              <span class="menu-text">{{ item.name }}</span>
            </button>
          }
        </div>
      </section>
    }
  </div>

  <div class="sidebar-user orb-card">
    <div class="avatar">A</div>
    <div class="user-copy">
      <strong>{{ userName }}</strong>
      <span>Master</span>
    </div>
    <button type="button" class="logout-btn" (click)="logout()">Sair</button>
  </div>
</aside>
